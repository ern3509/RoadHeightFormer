# Classification variant with DINOv2_fb backbone.
# regression=false routes train.py:1181 to MyLoss (classification head over
# elevation bins of width cla_res). The loss.* block is kept for parser
# compat but is ignored on this path.

# Dataset Configuration
dataset:
  name: "CARDSetSmall"
  stereo: false
  preprocessed: true
  augmentation: false
  clamp_gt: false
  crop_to_road: false

# Model Configuration
model:
  backbone: "DINOv2_fb"
  regression: false
  normalize: false
  pred_head_dim: 128
  cla_res: 0.5
  dino_size: "small"
  train_encoder: false

# Training Configuration
training:
  batch_size: 8
  epochs: 30
  seed: 307

# Loss Configuration (unused under regression=false; kept for parser compat)
loss:
  type: "composite"
  pixel_type: "MSE"
  gradient_weight: 0
  composite_weights:
    pixel: 0.3
    gradient: 1.0
    structure: 0.0
    normal: 1.0
    smoothness: 0.0

# Optimizer Configuration
optimizer:
  lr: 1.0e-4
  lr_encoder: 1.0e-5

# Scheduler Configuration
scheduler:
  type: "onecycle"

# Logging and Checkpointing
logging:
  logdir: "/data/rhf/checkpoints/"
  summary_freq: 10

# Weights & Biases (WandB)
wandb:
  enabled: true
  entity: "erwan-adonie-njike-ndjongang-cariad"
  project: "RoadHeightFormer"
  name_run: "RHF_dinov2fb_classification"
  notes: "DINOv2_fb backbone with classification head (regression=false)"
  dir: "/data/rhf/wandb"

# Checkpoint Loading
checkpoint:
  load_path: null
