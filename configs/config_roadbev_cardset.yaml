# Variant of config_freeze_baseline.yaml — replicates the original RoadBEV
# setup (EfficientNet backbone + classification head) on CARDSetSmall.
# Differences vs. freeze baseline: backbone="efficientnet", regression=false.
# train.py:1181 selects MyLoss (classification) when regression=false; the
# loss.type / composite_weights below are ignored by that path.

# Dataset Configuration
dataset:
  name: "CARDSetSmall"
  stereo: false
  preprocessed: true
  augmentation: false
  clamp_gt: false
  crop_to_road: false

# Model Configuration
model:
  backbone: "efficientnet"
  regression: false
  normalize: false
  pred_head_dim: 128
  cla_res: 0.5
  dino_size: "small"
  train_encoder: false

# Training Configuration
training:
  batch_size: 8
  epochs: 30
  seed: 307

# Loss Configuration (unused under regression=false; kept for parser compat)
loss:
  type: "composite"
  gradient_weight: 0
  composite_weights:
    pixel: 0.3
    gradient: 1.0
    structure: 0.0
    normal: 1.0
    smoothness: 0.0

# Optimizer Configuration
optimizer:
  lr: 1.0e-4
  lr_encoder: 1.0e-5

# Scheduler Configuration
scheduler:
  type: "onecycle"

# Logging and Checkpointing
logging:
  logdir: "/data/rhf/checkpoints/"
  summary_freq: 10

# Weights & Biases (WandB)
wandb:
  enabled: true
  entity: "erwan-adonie-njike-ndjongang-cariad"
  project: "RoadHeightFormer"
  name_run: "RoadBEV_cardset"
  notes: "Original RoadBEV (EfficientNet + classification) on CARDSetSmall"
  dir: "/data/rhf/wandb"

# Checkpoint Loading
checkpoint:
  load_path: null
