# Variant of config_freeze_baseline.yaml — swaps the upsampler from the
# DPT-style multi-stage `patch2feature` to `DinoUpsampler` (single-stage,
# upsample_factor=4 over the concatenated intermediate layers).
# Everything else is identical to the freeze baseline.

# Dataset Configuration
dataset:
  name: "CARDSetSmall"
  stereo: false
  preprocessed: true
  augmentation: false
  clamp_gt: false
  crop_to_road: false

# Model Configuration
model:
  backbone: "DINOv2_fb"
  regression: true
  normalize: false
  pred_head_dim: 128
  cla_res: 0.5
  dino_size: "small"
  train_encoder: false
  dinov2_layers: [5, 7, 9, 11]
  # 'patch2feature' (freeze-baseline default) or 'dino' (DinoUpsampler).
  upsampler_kind: "dino"

# Training Configuration
training:
  batch_size: 8
  epochs: 30
  seed: 307

# Loss Configuration
loss:
  type: "composite"
  gradient_weight: 0
  composite_weights:
    pixel: 0.3
    gradient: 1.0
    structure: 0.0
    normal: 1.0
    smoothness: 0.0

# Optimizer Configuration
optimizer:
  lr: 1.0e-4
  lr_encoder: 1.0e-5

# Scheduler Configuration
scheduler:
  type: "onecycle"

# Logging and Checkpointing
logging:
  logdir: "/data/rhf/checkpoints/"
  summary_freq: 10

# Weights & Biases (WandB)
wandb:
  enabled: true
  entity: "erwan-adonie-njike-ndjongang-cariad"
  project: "RoadHeightFormer"
  name_run: "RHF_dinov2_upsampler_dino"
  notes: "Freeze baseline + upsampler_kind=dino (DinoUpsampler instead of patch2feature)"
  dir: "/data/rhf/wandb"

# Checkpoint Loading
checkpoint:
  load_path: null
