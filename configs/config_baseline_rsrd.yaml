# Variant of config_freeze_baseline.yaml — runs the DINOv2_fb baseline on the
# RSRD-dense dataset instead of CARDSetSmall.
# train.py:1075 routes 'RSRD' in args.dataset to the RSRD class
# (utils/dataset.py:16). Preprocessed / clamp_gt / crop_to_road are ignored
# by the RSRD constructor and kept here only for parser compatibility.

# Dataset Configuration
dataset:
  name: "RSRD"
  stereo: false
  preprocessed: false
  augmentation: false
  clamp_gt: false
  crop_to_road: false

# Model Configuration
model:
  backbone: "DINOv2_fb"
  regression: true
  normalize: false
  pred_head_dim: 128
  cla_res: 0.5
  dino_size: "small"
  dinov2_layers: [5, 7, 9, 11]
  train_encoder: false
  upsampler_kind: "patch2feature"

# Training Configuration
training:
  batch_size: 8
  epochs: 30
  seed: 307

# Loss Configuration
loss:
  type: "composite"
  gradient_weight: 0
  composite_weights:
    pixel: 0.3
    gradient: 1.0
    structure: 0.0
    normal: 1.0
    smoothness: 0.0

# Optimizer Configuration
optimizer:
  lr: 1.0e-4
  lr_encoder: 1.0e-5

# Scheduler Configuration
scheduler:
  type: "onecycle"

# Logging and Checkpointing
logging:
  logdir: "/data/rhf/checkpoints/"
  summary_freq: 10

# Weights & Biases (WandB)
wandb:
  enabled: true
  entity: "erwan-adonie-njike-ndjongang-cariad"
  project: "RoadHeightFormer"
  name_run: "RHF_baseline_rsrd"
  notes: "Freeze baseline (DINOv2_fb) on RSRD-dense"
  dir: "/data/rhf/wandb"

# Checkpoint Loading
checkpoint:
  load_path: null
